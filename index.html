<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Documentations — Batik Wolter Bot</title>
<style>
  :root{
    --ink:#1c1a17; --muted:#6b635a; --line:#e7e0d6; --bg:#faf7f2;
    --card:#ffffff; --accent:#8a5a2b; --accent-soft:#f3e9dc;
  }
  *{box-sizing:border-box}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.65; font-size:16px;
  }
  .wrap{max-width:720px; margin:0 auto; padding:32px 22px 80px}
  header.hero{
    background:linear-gradient(135deg,#3a2c1c,#6b4a2a); color:#fff;
    border-radius:18px; padding:34px 30px; margin-bottom:30px;
  }
  header.hero h1{margin:0 0 8px; font-size:27px; line-height:1.25}
  header.hero p{margin:0; opacity:.9; font-size:15px}
  .tag{display:inline-block; background:rgba(255,255,255,.16); border-radius:999px;
    padding:3px 12px; font-size:12.5px; letter-spacing:.4px; margin-bottom:14px; text-transform:uppercase}
  .list{list-style:none; padding:0; margin:0}
  .list li{margin-bottom:10px}
  .list a{
    display:flex; align-items:center; gap:14px; padding:16px 20px;
    background:var(--card); border-radius:12px; text-decoration:none; color:var(--ink);
    border:1px solid var(--line); transition:box-shadow .15s, border-color .15s;
  }
  .list a:hover{box-shadow:0 4px 16px rgba(0,0,0,.06); border-color:var(--accent)}
  .list a .icon{
    width:40px; height:40px; border-radius:10px; background:var(--accent-soft);
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
    font-size:18px;
  }
  .list a .meta{font-size:13px; color:var(--muted); margin-top:3px}
  .list a .label{font-weight:600; font-size:16px}
  .empty{text-align:center; color:var(--muted); padding:40px 0}
  footer{text-align:center; color:var(--muted); font-size:13px; margin-top:48px}
  footer a{color:var(--accent)}
</style>
</head>
<body>
<div class="wrap">
  <header class="hero">
    <div class="tag">Dokumentasi</div>
    <h1>Batik Wolter Document Bot</h1>
    <p>Panduan, referensi, dan dokumentasi teknis untuk tim.</p>
  </header>

  <ul class="list">
    <li>
      <a href="bot-document-generator/panduan-pengisian-database.html">
        <span class="icon">📋</span>
        <div>
          <div class="label">Panduan Pengisian Database Kode</div>
          <div class="meta">bot-document-generator/</div>
        </div>
      </a>
    </li>
    <!-- ADD NEW PAGES BELOW THIS LINE -->
  </ul>

  <!-- ponytail: static link list, no JS. Add new <li> when new .html added. -->

  <footer>
    Generated by <a href="https://github.com/">Batik Wolter</a> &mdash; host di GitHub Pages
  </footer>
</div>
</body>
</html>
