<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Docs — Sesar Documentations</title>
<style>
  :root{
    --ink:#1c1a17; --muted:#6b635a; --line:#e7e0d6; --bg:#faf7f2;
    --card:#ffffff; --accent:#2563eb; --accent-soft:#eef2ff;
  }
  *{box-sizing:border-box}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.65; font-size:16px;
  }
  .wrap{max-width:720px; margin:0 auto; padding:32px 22px 80px}
  header.hero{
    background:linear-gradient(135deg,#1e293b,#334155); color:#fff;
    border-radius:18px; padding:34px 30px; margin-bottom:30px;
  }
  header.hero h1{margin:0 0 8px; font-size:27px; line-height:1.25}
  header.hero p{margin:0; opacity:.9; font-size:15px}
  .tag{display:inline-block; background:rgba(255,255,255,.16); border-radius:999px;
    padding:3px 12px; font-size:12.5px; letter-spacing:.4px; margin-bottom:14px; text-transform:uppercase}
  h2{font-size:16px; color:var(--muted); margin:32px 0 12px; font-weight:600;
    border-bottom:1px solid var(--line); padding-bottom:6px; display:flex; align-items:center; gap:8px}
  h2 .count{font-size:12px; font-weight:400; color:var(--muted); margin-left:auto}
  .list{list-style:none; padding:0; margin:0}
  .list li{margin-bottom:10px}
  .list a{
    display:flex; align-items:center; gap:14px; padding:16px 20px;
    background:var(--card); border-radius:12px; text-decoration:none; color:var(--ink);
    border:1px solid var(--line); transition:box-shadow .15s, border-color .15s;
  }
  .list a:hover{box-shadow:0 4px 16px rgba(0,0,0,.06); border-color:var(--accent)}
  .list a .icon{
    width:40px; height:40px; border-radius:10px; background:var(--accent-soft);
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
    font-size:18px;
  }
  .list a .meta{font-size:13px; color:var(--muted); margin-top:3px}
  .list a .label{font-weight:600; font-size:16px}
  .loading{text-align:center; color:var(--muted); padding:40px 0}
  .error{text-align:center; color:#b42318; padding:40px 0; font-size:14px}
  footer{text-align:center; color:var(--muted); font-size:13px; margin-top:48px}
  footer a{color:var(--accent)}
</style>
</head>
<body>
<div class="wrap">
  <header class="hero">
    <div class="tag">Documentations</div>
    <h1>Sesar Documentations</h1>
    <p>Public documentation, technical references, and project guides.</p>
  </header>

  <div id="content"><div class="loading">Loading&hellip;</div></div>

  <footer>
    Hosted on GitHub Pages &mdash; <a href="https://github.com/deccara-tech/documentations">source</a>
  </footer>
</div>

<script>
/* =============================================================
   DYNAMIC DOC LIST — GitHub Pages compatible
   Uses GitHub Trees API (1 request) to discover .html files.
   Cache: localStorage, 1hr TTL. Falls back to static list locally.
   ============================================================= */

const REPO = { owner: 'deccara-tech', repo: 'documentations', branch: 'main' };
const CACHE_KEY = 'docs-tree';
const CACHE_TTL = 60 * 60 * 1000; // 1 hour

// ─── humanize dir name ───
function humanize(name) {
  return name
    .replace(/[-_]/g, ' ')
    .replace(/\b\w/g, c => c.toUpperCase())
    .replace(/\b(Poc|Sop|Ui|Qc|Dp|Os|Rnd)\b/gi, s => s.toUpperCase());
}

// ─── extract <title> from HTML text ───
function extractTitle(html) {
  const m = html.match(/<title>([^<]*)<\/title>/i);
  return m ? m[1].trim() : null;
}

// ─── render ───
function render(projects) {
  const el = document.getElementById('content');
  if (!projects || projects.length === 0) {
    el.innerHTML = '<div class="loading">No documentation found yet. Add a directory with an .html file.</div>';
    return;
  }

  // group by top-level dir
  const groups = {};
  for (const p of projects) {
    const dir = p.path.split('/')[0];
    if (!groups[dir]) groups[dir] = [];
    groups[dir].push(p);
  }

  let html = '';
  for (const [dir, files] of Object.entries(groups)) {
    html += `<h2>${humanize(dir)}<span class="count">${files.length} page${files.length > 1 ? 's' : ''}</span></h2><ul class="list">`;
    for (const f of files) {
      const title = f.title || humanize(f.name.replace(/\.html$/, ''));
      html += `
    <li>
      <a href="${f.path}">
        <span class="icon">📄</span>
        <div>
          <div class="label">${title}</div>
          <div class="meta">${f.path}</div>
        </div>
      </a>
    </li>`;
    }
    html += '</ul>';
  }
  el.innerHTML = html;
}

// ─── fetch with timeout ───
async function fetchJSON(url, timeout = 8000) {
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), timeout);
  try {
    const res = await fetch(url, { signal: ctrl.signal });
    if (!res.ok) throw new Error(`${res.status}`);
    return res.json();
  } finally {
    clearTimeout(t);
  }
}

// ─── fetch HTML page (same-origin, no rate limit) ───
async function fetchTitle(path) {
  try {
    const res = await fetch(path);
    if (!res.ok) return null;
    const text = await res.text();
    return extractTitle(text);
  } catch { return null; }
}

// ─── get tree from API ───
async function fetchTree() {
  const url = `https://api.github.com/repos/${REPO.owner}/${REPO.repo}/git/trees/${REPO.branch}?recursive=1`;
  const data = await fetchJSON(url);
  return data.tree;
}

// ─── process tree into project list ───
function processTree(tree) {
  return tree
    .filter(item => item.type === 'blob' && item.path.endsWith('.html') && !item.path.startsWith('.'))
    .map(item => ({
      path: item.path,
      name: item.path.split('/').pop(),
      title: null
    }));
}

// ─── try API, with cache ───
async function loadFromAPI() {
  // try cache first
  const cached = localStorage.getItem(CACHE_KEY);
  if (cached) {
    try {
      const { time, projects } = JSON.parse(cached);
      if (Date.now() - time < CACHE_TTL) return projects;
    } catch {}
  }

  // fetch tree
  let tree;
  try { tree = await fetchTree(); }
  catch (e) {
    // try master if main fails
    if (REPO.branch === 'main') {
      REPO.branch = 'master';
      try { tree = await fetchTree(); } catch { return null; }
    } else {
      return null;
    }
  }

  const projects = processTree(tree);

  // cache (even without titles — fill titles async)
  localStorage.setItem(CACHE_KEY, JSON.stringify({ time: Date.now(), projects }));

  // fetch titles in parallel (same-origin, no rate limit)
  const titled = await Promise.all(projects.map(async p => {
    p.title = await fetchTitle(p.path);
    return p;
  }));

  // update cache with titles
  localStorage.setItem(CACHE_KEY, JSON.stringify({ time: Date.now(), projects: titled }));

  return titled;
}

// ─── detect if on GitHub Pages ───
function isGitHubPages() {
  return window.location.hostname.endsWith('github.io');
}

// ─── local fallback (edit this when testing locally) ───
const LOCAL_FALLBACK = [
  { path: 'bot-document-generator/panduan-pengisian-database.html', name: 'panduan-pengisian-database.html', title: 'Panduan Pengisian Database Kode' },
  { path: 'poc-batikwolter-sop-rnd-ui/index.html', name: 'index.html', title: 'Batik Wolter — Operational OS (POC)' }
];

// ─── init ───
(async function init() {
  const el = document.getElementById('content');

  if (isGitHubPages()) {
    el.innerHTML = '<div class="loading">Loading&hellip;</div>';
    const projects = await loadFromAPI();
    if (projects) {
      render(projects);
      return;
    }
    // API failed → render error with cache suggestion
    el.innerHTML = '<div class="error">Could not load project list. Try refreshing, or <a href="https://github.com/deccara-tech/documentations">browse the repo</a>.</div>';
    return;
  }

  // local dev: render from LOCAL_FALLBACK
  render(LOCAL_FALLBACK);
})();
</script>
</body>
</html>
