        </div>
        <p class="muted" style="font-size:17px">Kamu mengatur bot lewat <strong>spreadsheet</strong>, bukan lewat program. Ada beberapa tab bernama diawali <code>config_</code> — di situlah kamu mengatur siapa yang boleh pakai bot, dari grup mana, perusahaan apa saja, cabang, dan aturan umum.</p>

        </div>
        <div class="card" style="border-left:4px solid var(--accent)">
          <strong>Jangan sentuh tab buatan bot</strong>
          <p style="margin:6px 0 0">Tab seperti <code>request_log</code>, <code>decision_log</code>, <code>counter_global</code>, <code>QUO</code>, <code>INV</code>, <code>RCP</code>, dan <code>DATABASE</code> diisi otomatis oleh bot. Jangan diubah manual. Kamu hanya mengurus tab yang diawali <code>config_</code>.</p>
        </div>`
    },
    {

        <table>
          <thead><tr><th>Tab</th><th>Mengatur apa</th></tr></thead>
          <tbody>
            <tr><td><code>config_roles</code></td><td>Siapa saja yang boleh pakai bot &amp; izinnya (minta dokumen / finance / admin)</td></tr>

        </div>`

        <table>
          <thead><tr><th>Kolom</th><th>Isi</th></tr></thead>

            <tr><td><code>notes</code></td><td>Catatan bebas</td></tr>
          </tbody>
        </table>
        <div class="card" style="border-left:4px solid var(--brand-2)">
          <strong>Menonaktifkan seseorang</strong>
          <p style="margin:6px 0 0">Jangan hapus barisnya — cukup ubah <code>active</code> jadi <code>FALSE</code>. Nanti kalau dibutuhkan lagi tinggal <code>TRUE</code> kembali.</p>
        </div>

        </div>

    },

      html:`

        <table>
          <thead><tr><th>setting</th><th>value</th><th>Artinya</th></tr></thead>
          <tbody>
            <tr><td><code>require_group_only</code></td><td><code>TRUE</code> / <code>FALSE</code></td><td><code>TRUE</code> = bot hanya menanggapi di grup, bukan chat pribadi</td></tr>
            <tr><td><code>allowed_group_id</code></td><td>ID grup</td><td>Grup yang diizinkan (boleh beberapa baris)</td></tr>
            <tr><td><code>allowed_chat_id</code></td><td>ID chat</td><td>Chat yang diizinkan (boleh beberapa baris)</td></tr>
          </tbody>
        </table>
        <div class="card" style="border-left:4px solid var(--brand)">
          <strong>ID grup/chat dari mana?</strong>
          <p style="margin:6px 0 0">ID grup/chat tidak bisa dilihat langsung dari WhatsApp — butuh alat bantu terpisah. Sistem WhatsApp yang dipakai bot (GOWA) punya halaman web untuk melihat daftar grup beserta ID-nya. Kalau kamu perlu menambah grup baru dan tidak tahu ID-nya, <strong>minta ke teknisi</strong>.</p>
        </div>
        <p class="muted">Tanpa pengaturan, bot berlaku "hanya grup" secara default demi keamanan.</p>`
    },
    {

      html:`

          <thead><tr><th>Kolom</th><th>Isi</th></tr></thead>
          <tbody>

            <tr><td><code>company_code</code></td><td>Kode angka penomoran (lihat tabel di bawah)</td></tr>
            <tr><td><code>spreadsheet_id</code></td><td>Spreadsheet tempat data perusahaan ini disimpan (dari teknisi)</td></tr>
            <tr><td><code>active</code></td><td><code>TRUE</code> agar perusahaan ini aktif</td></tr>
            <tr><td><code>notes</code></td><td>Catatan bebas</td></tr>
          </tbody>
        </table>
        <p>Kode angka penomoran (<code>company_code</code>) yang dipakai saat ini:</p>
        <table>
          <thead><tr><th>company</th><th>company_code</th></tr></thead>
          <tbody>
            <tr><td><code>WBN</code></td><td>18</td></tr>
            <tr><td><code>WBD</code></td><td>71</td></tr>
            <tr><td><code>WBM</code></td><td>21</td></tr>
            <tr><td><code>WBJ</code></td><td>19</td></tr>
            <tr><td><code>WBK</code></td><td>31</td></tr>
            <tr><td><code>WBB</code></td><td>30</td></tr>
          </tbody>
        </table>
        <p class="muted">Angka <code>company_code</code> diambil dari tab ini apa adanya — kalau dikosongkan, bot pakai kode bawaan. Untuk perusahaan baru, minta angka yang benar ke teknisi.</p>
        <div class="card" style="border-left:4px solid var(--brand-2)">
          <strong>Contoh nomor dokumen</strong>
          <p style="margin:6px 0 0">Untuk WBM, nomor invoice terbentuk seperti <code>INV-2521001.WBM.CRM</code> — angka <code>21</code> di dalamnya berasal dari <code>company_code</code>, dan <code>WBM</code> di akhir berasal dari <code>company</code>.</p>
        </div>
        <div class="card" style="border-left:4px solid var(--accent)">
          <strong>Kolom teknis lain</strong>
          <p style="margin:6px 0 0">Ada juga kolom nama-nama tab (mis. <code>request_log</code>, <code>master_inv</code>) dan <code>credentials_file</code>. <strong>Biarkan default / kosong</strong> kecuali teknisi meminta mengubahnya. Nama perusahaan tidak boleh dobel di dua baris aktif.</p>
        </div>`
    },
    {

      html:`
        <p>Menerjemahkan kata cabang yang diketik user menjadi <strong>alamat lengkap</strong> yang tercetak di dokumen. Satu baris = satu cabang.</p>
        <table>
          <thead><tr><th>Kolom</th><th>Isi</th></tr></thead>

        <div class="card" style="border-left:4px solid var(--brand-2)">

          <p style="margin:6px 0 0">Pakai kata kunci yang sama persis dengan yang biasa diketik user. Kata cabang yang sama tidak boleh muncul di dua baris aktif.</p>
        </div>`
    },
    {
      id:"staff", nav:"Staf & rekening", title:"7. Staf & rekening (config_staff)", type:"html",
      html:`
        <p>Menentukan siapa yang di-<em>mention</em> (ditandai) saat sebuah rekening dipakai. Satu baris = satu rekening/staf.</p>
        <table>
          <thead><tr><th>Kolom</th><th>Isi</th></tr></thead>

          <thead><tr><th>key</th><th>value</th><th>Artinya</th></tr></thead>

        </div>
        <div class="card" style="border-left:4px solid var(--brand)">
          <strong>Nama-nama tab</strong>
          <p style="margin:6px 0 0">Tab ini juga bisa menimpa nama tab log/master. <strong>Jangan diubah</strong> kecuali teknisi memintanya.</p>
        </div>`
    },
    {
      id:"katalog", nav:"Katalog barang", title:"9. Katalog barang", type:"html",
      html:`
        <p>Daftar kode &amp; nama barang ada di tab <code>DATABASE</code>, dan sudah punya panduan sendiri. Tidak diulang di sini.</p>
        <div class="card" style="border-left:4px solid var(--brand-2)">
          <strong>Buka panduannya</strong>
          <p style="margin:6px 0 0">Lihat <a href="panduan-pengisian-database.html">Panduan Database</a> untuk cara mengisi kode produk.</p>
        </div>`

      id:"aturan", nav:"Aturan emas", title:"10. Aturan emas & kesalahan umum", type:"html",
      html:`
        <div class="grid2">
          <div class="card" style="border-left:4px solid var(--brand-2)">
            <strong>✓ Lakukan</strong>
            <p style="margin:6px 0 0">Selalu isi kolom <code>active</code>. Untuk mematikan sesuatu, ubah ke <code>FALSE</code> — jangan hapus barisnya.</p>
          </div>
          <div class="card" style="border-left:4px solid var(--brand-2)">
            <strong>✓ Lakukan</strong>
            <p style="margin:6px 0 0">Sebelum mengubah banyak baris, salin dulu tab-nya sebagai cadangan (klik kanan tab → Duplicate).</p>
          </div>
          <div class="card" style="border-left:4px solid var(--brand-2)">
            <strong>✓ Lakukan</strong>
            <p style="margin:6px 0 0">Pastikan hanya ada <strong>satu baris aktif</strong> per nomor orang / nama perusahaan / kunci / cabang.</p>
          </div>
          <div class="card" style="border-left:4px solid var(--accent)">
            <strong>✕ Hindari</strong>
            <p style="margin:6px 0 0">Mengubah atau menghapus <strong>baris judul (header)</strong> paling atas tiap tab. Nama kolom harus tetap.</p>
          </div>
          <div class="card" style="border-left:4px solid var(--accent)">
            <strong>✕ Hindari</strong>
            <p style="margin:6px 0 0">Mengedit tab buatan bot (<code>request_log</code>, <code>decision_log</code>, <code>counter_global</code>, <code>QUO</code>/<code>INV</code>/<code>RCP</code>).</p>
          </div>
          <div class="card" style="border-left:4px solid var(--accent)">
            <strong>✕ Hindari</strong>
            <p style="margin:6px 0 0">Membuat dua baris aktif yang sama (dobel). Bot akan menolak seluruh pengaturan baru sampai diperbaiki.</p>
          </div>
        </div>`

    {
      id:"cek", nav:"Cek cepat", title:"11. Kalau ada yang aneh — cek cepat", type:"html",
      html:`
        <table>
          <thead><tr><th>Gejala</th><th>Coba periksa</th></tr></thead>
          <tbody>
            <tr><td>Seseorang tidak bisa pakai bot</td><td>Baris orang itu di <code>config_roles</code> <code>active=TRUE</code>? <code>can_request</code> sesuai? Nomor benar &amp; tidak dobel?</td></tr>
            <tr><td>Bot diam di grup tertentu</td><td>Grup itu terdaftar di <code>config_sender</code> (<code>allowed_group_id</code>)? <code>require_group_only</code> sesuai?</td></tr>
            <tr><td>Nomor dokumen salah</td><td><code>company</code> &amp; <code>company_code</code> di <code>config_companies</code> benar?</td></tr>
            <tr><td>Alamat cabang tidak muncul</td><td>Kata cabang cocok dengan <code>branch</code> di <code>config_locations</code>?</td></tr>
            <tr><td>Pengaturan baru tidak terpakai</td><td>Ada baris dobel atau nilai salah (mis. bukan angka)? Bot menolak dan memakai yang lama — perbaiki lalu tunggu sebentar.</td></tr>
          </tbody>
        </table>
        <div class="card" style="border-left:4px solid var(--brand-2)">
          <strong>Uji akses cepat</strong>
          <p style="margin:6px 0 0">Minta orang yang bermasalah mengetik <kbd>!check</kbd> di WhatsApp. Balasannya menunjukkan izin yang bot lihat untuk orang itu — cara tercepat memastikan <code>config_roles</code> sudah benar.</p>
        </div>
        <p class="muted">Kalau masalahnya di luar tab <code>config_</code> (bot mati total, tidak terhubung WhatsApp, file tidak tersimpan), hubungi teknisi.</p>`
    },
  ],
