      html:`
        <p>Saat menemukan sebuah kode, bot mencari deskripsi dengan urutan berikut (sesuai loader di program). Begitu ketemu, pencarian berhenti.</p>
        <ol class="steps">
          <li><strong>Kode penuh</strong> — seluruh kode persis ada di baris <code>exact_code</code>? (mis. <code>JL</code> → Jahit Luar)</li>
          <li><strong>Kombinasi set + suffix</strong> — baris <code>structured_code</code> dengan <code>code_front</code> + <code>back_code</code> yang cocok. (mis. front <code>C</code> + suffix <code>C</code> → Kain Couple Katun Batik Tulis)</li>
          <li><strong>Prefix + suffix</strong> — baris <code>prefix_suffix</code> (kunci <code>PREFIX|SUFFIX</code>, mis. <code>TN|P</code>).</li>
          <li><strong>Prefix</strong> — baris <code>prefix_code</code> (mis. <code>BC</code> → Batik Cap).</li>
          <li><strong>Huruf pertama prefix</strong> — baris <code>prefix_family</code> (fallback luas).</li>
          <li><strong>Suffix</strong> — baris <code>suffix_code</code> (mis. <code>C</code> → Kain Katun Batik Tulis).</li>
        </ol>

        </div>

        </div>`

    {
      id:"ruletype", nav:"Jenis baris", title:"5. Jenis baris (rule_type) & contohnya", type:"html",
      html:`
        <p>Setiap baris punya satu <code>rule_type</code> yang menentukan kolom wajib diisi. Ada dua alur: <strong>nama → kode</strong> (saat user tidak menulis kode) dan <strong>kode → deskripsi</strong> (saat membaca kode jadi tulisan PDF).</p>

        <h3>1 · <code>item_name</code> — nama barang → kode otomatis</h3>
        <p>Dipakai saat user menulis <em>nama</em> barang, bukan kode (mis. <code>(BATIK CAP)</code>). Bot mencari nama (sudah dinormalisasi: HURUF BESAR, spasi→<code>_</code>) lalu membuat kode dari <code>code_prefix</code> + <code>code_suffix</code>. Bila <code>needs_running=TRUE</code>, ditambah nomor urut 4 digit (mis. <code>0001</code>).</p>
        <table>
          <tr><th>match_key</th><th>description_id</th><th>code_prefix</th><th>code_suffix</th><th>needs_running</th><th>→ kode dihasilkan</th></tr>
          <tr><td>JAHIT_LUAR</td><td>Jahit Luar</td><td>JL</td><td></td><td>FALSE</td><td><code>JL</code> (jasa, tanpa urut)</td></tr>
          <tr><td>BATIK_CAP</td><td>Batik Cap</td><td>BC</td><td></td><td>TRUE</td><td><code>BC0001</code>, <code>BC0002</code>…</td></tr>
          <tr><td>CUSTOM</td><td>Kain Custom</td><td>W</td><td></td><td>TRUE</td><td><code>W0001</code></td></tr>
          <tr><td>KAIN_KATUN_BATIK_TULIS</td><td>Kain Katun Batik Tulis</td><td>P</td><td>C</td><td>TRUE</td><td><code>P0001C</code> (prefix + urut + suffix)</td></tr>
          <tr><td>KAIN_COUPLE_SUTRA_BATIK_TULIS</td><td>Kain Couple Sutra Batik Tulis</td><td>CP</td><td>S</td><td>TRUE</td><td><code>CP0001S</code></td></tr>
        </table>

        <h3>2 · <code>exact_code</code> — kode persis → deskripsi</h3>
        <p>Kode lengkap dicocokkan apa adanya. Cocok untuk kode pendek/final yang tidak perlu analisa prefix/suffix. Wajib: <strong>match_key</strong> (kode) + <strong>description_id</strong>. Isi <strong>description_en</strong> bila perlu versi English.</p>
        <table>
          <tr><th>match_key</th><th>description_id</th><th>description_en</th></tr>
          <tr><td>JL</td><td>Jahit Luar</td><td></td></tr>
          <tr><td>TN</td><td>Kain Tenun</td><td></td></tr>
          <tr><td>TAILORING</td><td>Layanan Bespoke Tailoring Kemeja</td><td>Bespoke Shirt Tailoring Service</td></tr>
          <tr><td>FEE EXPRESS</td><td>Fee Express</td><td>Express Fee</td></tr>
        </table>

        <h3>3 · <code>structured_code</code> — set + suffix → jenis kain</h3>
        <p>Kombinasi <code>code_front</code> (penanda set, kosong = satuan) dan <code>back_code</code> (huruf suffix). Catatan penting: huruf di posisi prefix-terakhir adalah <em>kode harga</em> dan diabaikan; yang dipakai hanya front + suffix. Wajib: <strong>description_id</strong>, <strong>code_front</strong>, <strong>back_code</strong>.</p>
        <table>
          <tr><th>code_front</th><th>back_code</th><th>description_id</th><th>cocok dengan kode</th></tr>
          <tr><td><em>(kosong)</em></td><td>C</td><td>Kain Katun Batik Tulis</td><td><code>P8172C</code>, <code>V1234C</code></td></tr>
          <tr><td><em>(kosong)</em></td><td>Z</td><td>Kain Sutra Batik Tulis Perada</td><td><code>S9001Z</code></td></tr>
          <tr><td>C</td><td>S</td><td>Kain Couple Sutra Batik Tulis</td><td><code>CP7158S</code></td></tr>
          <tr><td>F</td><td>B</td><td>Kain Sarong Katun Batik Tulis Perada</td><td><code>FP2201B</code></td></tr>
          <tr><td>T</td><td>L</td><td>Kain Tenun Sutra</td><td><code>TQ042L</code>, <code>TN042L</code></td></tr>
        </table>

        <h3>4 · <code>prefix_suffix</code> — kombinasi prefix+suffix khusus</h3>
        <p><span class="pill">Belum dipakai di data sekarang</span> · didukung loader. Untuk memberi arti khusus pada kombinasi prefix &amp; suffix tertentu. Format <strong>match_key</strong>: <code>PREFIX|SUFFIX</code> (pakai <code>|</code>, bukan <code>-</code>/<code>/</code>).</p>
        <div class="card" style="border-left:4px solid var(--accent)">
          <strong>Perhatikan prioritas</strong>
          <p style="margin:6px 0 0">Rule ini hanya menang atas <code>prefix_code</code> &amp; <code>suffix_code</code>, tetapi <em>kalah</em> dari <code>structured_code</code>. Jadi jika sudah ada baris <code>structured_code</code> untuk kombinasi itu (mis. front <code>T</code> + back <code>P</code>), baris itulah yang dipakai — bukan <code>prefix_suffix</code>.</p>
        </div>
        <table>
          <tr><th>match_key</th><th>description_id</th><th>kegunaan</th></tr>
          <tr><td>XY|P</td><td>Deskripsi Khusus XY-P</td><td>kode berprefix <code>XY</code> &amp; bersuffix <code>P</code> yang tidak punya aturan structured</td></tr>
        </table>

        <h3>5 · <code>prefix_code</code> — huruf depan → deskripsi</h3>
        <p>Barang dikenali dari prefix-nya (huruf depan sebelum angka). Wajib: <strong>match_key</strong> (prefix) + <strong>description_id</strong>.</p>
        <table>
          <tr><th>match_key</th><th>description_id</th><th>cocok dengan kode</th></tr>
          <tr><td>BC</td><td>Batik Cap</td><td><code>BC0007</code></td></tr>
          <tr><td>AL</td><td>Adjust Luar</td><td><code>AL12</code></td></tr>
          <tr><td>BV</td><td>Benang Variasi</td><td><code>BV - 05</code></td></tr>
        </table>

        <h3>6 · <code>prefix_family</code> — huruf pertama prefix (fallback luas)</h3>
        <p><span class="pill">Belum dipakai di data sekarang</span> · didukung loader. Cadangan: bila prefix lengkap tidak ketemu, bot coba <em>huruf pertama</em>-nya. Gunakan hati-hati karena cakupannya luas.</p>
        <table>
          <tr><th>match_key</th><th>description_id</th><th>arti</th></tr>
          <tr><td>C</td><td>Kain Katun Batik Tulis</td><td>semua kode berawalan C tak dikenal → katun</td></tr>
          <tr><td>S</td><td>Kain Sutra Batik Tulis</td><td>berawalan S → sutra</td></tr>
        </table>

        <h3>7 · <code>suffix_code</code> — huruf terakhir → deskripsi</h3>
        <p><span class="pill">Belum dipakai di data sekarang</span> · didukung loader. Alternatif sederhana dari <code>structured_code</code> bila arti barang hanya ditentukan huruf suffix (tanpa set). Wajib: <strong>match_key</strong> (suffix) + <strong>description_id</strong>.</p>
        <table>
          <tr><th>match_key</th><th>description_id</th></tr>
          <tr><td>C</td><td>Kain Katun Batik Tulis</td></tr>
          <tr><td>U</td><td>Kain Katun Batik Tulis Perada</td></tr>
          <tr><td>H</td><td>Kain Selendang Katun Batik Tulis <em>(suffix baru)</em></td></tr>
        </table>

        <h3>8 · <code>price_code</code> — huruf harga → nominal (referensi)</h3>
        <p>Tabel katalog harga per huruf. <strong>Tidak dipakai bot untuk menghitung harga</strong> (harga selalu dari pesan WhatsApp) — murni dokumentasi internal. Wajib: <strong>match_key</strong> (huruf) + <strong>price_amount_k</strong>.</p>
        <table>
          <tr><th>match_key</th><th>price_amount_k</th><th>nominal</th></tr>
          <tr><td>Y</td><td>2279</td><td>Rp 2.279.000</td></tr>
          <tr><td>C</td><td>3179</td><td>Rp 3.179.000</td></tr>
          <tr><td>O</td><td>4179</td><td>Rp 4.179.000</td></tr>
        </table>`
    },
    {

      html:`

        <div class="card" style="border-left:4px solid var(--brand-2)"><strong>Hasil di PDF:</strong>
          <ul style="margin:6px 0 0;padding-left:18px">
            <li>Batik Cap (BC0001) — Rp 500.000 <em>(kode urut dibuat otomatis, needs_running TRUE)</em></li>
            <li>Jahit Luar (JL) — Rp 350.000 <em>(tanpa nomor urut, needs_running FALSE)</em></li>
          </ul>
        </div>

        <div class="card" style="border-left:4px solid var(--brand)">
          <strong>Tentang dokumen English</strong>
          <p style="margin:6px 0 0">Jika <code>LANGUAGE: ENGLISH</code>, deskripsi diambil dari <code>description_en</code> — tetapi hanya untuk barang yang dicocokkan lewat <code>item_name</code>. Barang yang dikenali dari <em>kode</em> tetap memakai <code>description_id</code>.</p>
        </div>`
