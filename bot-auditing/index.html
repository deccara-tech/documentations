        <div class="grid2">

            <h3>Apa ini?</h3>
            <p>Asisten WhatsApp untuk audit. Kirim sebuah <b>form</b>, bot mencatat
            temuan sebagai <b>Audit Case</b> dengan nomor <code>REF_AUDIT</code>,
            lalu memandu perbaikan sampai temuan ditutup.</p>

            <h3>Sebelum mulai</h3>
            <ul style="margin:0;padding-left:18px">

              <li>Kirim pesan di grup WhatsApp yang diizinkan.</li>
              <li>Ketik <kbd>!check</kbd> kapan saja untuk melihat akses kamu.</li>
            </ul>
          </div>
        </div>
        <h3>Alur singkat</h3>
        <ol class="steps">
          <li><b>Auditor kirim FORM AUDIT.</b> Bot membuat Audit Case dan memberi <code>REF_AUDIT</code>.</li>
          <li><b>Yang diaudit menindaklanjuti.</b> Tergantung kategori: <b>FORM PERBAIKAN</b> jika temuan bisa diperbaiki, atau <b>FORM CONFIRMED</b> jika hanya perlu konfirmasi. Keduanya di-reply ke pesan audit.</li>

        </ol>`

        <p>Kirim setiap form sebagai <b>satu pesan</b>. Ganti bagian di dalam &lt; &gt;.</p>
        <h3>FORM AUDIT (buat temuan)</h3>
        <pre>FORM AUDIT
AUDITED: &lt;kode resmi audited, contoh CR001&gt;
CATEGORY: &lt;kategori audit&gt;
AUDITOR: &lt;kode auditor&gt;
CODE: &lt;kode/klien, opsional&gt;

CATEGORY: &lt;kategori&gt;

        <details><summary>Bot tidak membalas — kenapa?</summary>
          <p>Kirim <kbd>!check</kbd>. Kalau tidak ada balasan atau “tidak terdaftar”, minta DBO Supervisor (Admin). Selain itu, tunggu sebentar dan kirim ulang form.</p></details>

          <p>Hanya nomor <b>audited</b> terkait, dan harus me-reply pesan audit sebelumnya.</p></details>

          <p>Hanya <b>superior</b> yang diaudit atau <b>auditor</b> audit tersebut.</p></details>
