<meta charset="utf-8">
<title>Batik Wolter — Operational OS (POC)</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root{
    --bg:#ffffff; --sidebar:#fbfaf9; --line:#e9e7e2; --line-2:#efedea;
    --ink:#37352f; --ink-soft:#6b675f; --ink-faint:#9b968c;
    --accent:#2f6df6; --accent-soft:#eaf1ff;
    --order:#d97706; --order-bg:#fef3e2;
    --prod:#7c3aed; --prod-bg:#f3ecff;
    --support:#0d9488; --support-bg:#e2f6f3;
    --lock:#b42318; --lock-bg:#fdeceb;
    --ok:#137a4d; --ok-bg:#e6f5ec;
    --radius:8px; --shadow:0 1px 2px rgba(15,15,15,.06),0 3px 12px rgba(15,15,15,.05);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;color:var(--ink);background:var(--bg);font-size:14px;line-height:1.5}
  button{font-family:inherit;font-size:inherit;cursor:pointer}
  a{color:inherit}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:#dcd9d2;border-radius:6px;border:2px solid var(--bg)}

  /* layout */
  .app{display:grid;grid-template-columns:248px 1fr;height:100vh;overflow:hidden}
  .side{background:var(--sidebar);border-right:1px solid var(--line);display:flex;flex-direction:column;overflow-y:auto}
  .main{overflow-y:auto;position:relative}
  .wrap{max-width:940px;margin:0 auto;padding:34px 40px 120px}

  /* sidebar */
  .brand{padding:16px 16px 10px;display:flex;gap:10px;align-items:center}
  .logo{width:30px;height:30px;border-radius:7px;background:linear-gradient(135deg,#2f6df6,#7c3aed);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px}
  .brand b{font-size:14px;display:block;line-height:1.2}
  .brand span{font-size:11px;color:var(--ink-faint)}
  .persona{padding:6px 12px 12px}
  .persona-lbl{font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-faint);margin:6px 4px}
  .seg{display:flex;background:#efece7;border-radius:7px;padding:3px}
  .seg button{flex:1;border:0;background:transparent;color:var(--ink-soft);padding:5px 6px;border-radius:5px;font-size:12px;font-weight:600}
  .seg button.on{background:#fff;color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.08)}
  .rolepick{margin:8px 4px 0}
  .rolepick select{width:100%;padding:6px 8px;border:1px solid var(--line);border-radius:6px;background:#fff;color:var(--ink);font-size:12px}
  .nav{padding:6px 8px;flex:1}
  .nav .grp{font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-faint);margin:14px 8px 4px}
  .nav button{display:flex;align-items:center;gap:9px;width:100%;border:0;background:transparent;color:var(--ink-soft);
    padding:7px 8px;border-radius:6px;text-align:left;font-size:13.5px}
  .nav button:hover{background:#efece7}
  .nav button.on{background:#e9e6df;color:var(--ink);font-weight:600}
  .nav .ico{width:18px;text-align:center;font-size:14px}
  .nav .tag{margin-left:auto;font-size:9.5px;color:var(--ink-faint);border:1px solid var(--line);border-radius:20px;padding:1px 6px}
  .sidefoot{padding:12px;border-top:1px solid var(--line);font-size:11px;color:var(--ink-faint)}

  /* generic */
  h1{font-size:26px;margin:0 0 2px;letter-spacing:-.01em}
  h2{font-size:16px;margin:26px 0 10px}
  .lead{color:var(--ink-soft);margin:0 0 18px;max-width:660px}
  .crumb{font-size:12px;color:var(--ink-faint);margin-bottom:10px}
  .crumb a{cursor:pointer;text-decoration:none}.crumb a:hover{text-decoration:underline}
  .pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:2px 9px;border-radius:20px;border:1px solid transparent;white-space:nowrap}
  .p-order{background:var(--order-bg);color:var(--order)} .p-prod{background:var(--prod-bg);color:var(--prod)} .p-support{background:var(--support-bg);color:var(--support)}
  .p-linear{background:#eef1f6;color:#4b5566} .p-branch{background:#fdf0e6;color:#b45309}
  .p-lock{background:var(--lock-bg);color:var(--lock)} .p-open{background:var(--ok-bg);color:var(--ok)}
  .p-ghost{background:#f1efec;color:var(--ink-soft)}
  .muted{color:var(--ink-faint)}
  .btn{border:1px solid var(--line);background:#fff;color:var(--ink);padding:8px 14px;border-radius:7px;font-weight:600;box-shadow:var(--shadow)}
  .btn:hover{background:#faf9f7}
  .btn.pri{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn.pri:hover{filter:brightness(1.05)}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .card{border:1px solid var(--line);border-radius:var(--radius);background:#fff}
  .note{background:#fbfaf8;border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:6px;padding:12px 14px;color:var(--ink-soft);font-size:13px;margin:16px 0}

  /* division flow board */
  .board{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:6px}
  .col-head{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-weight:700;font-size:13px}
  .fcard{border:1px solid var(--line);border-radius:9px;background:#fff;padding:13px;margin-bottom:12px;cursor:pointer;transition:.12s;box-shadow:var(--shadow)}
  .fcard:hover{border-color:#cfd6e4;transform:translateY(-1px)}
  .fcard.fresh{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .fcard .ftitle{font-weight:650;margin-bottom:6px;display:flex;justify-content:space-between;gap:6px}
  .fcard .fmeta{display:flex;flex-wrap:wrap;gap:5px;margin:8px 0}
  .fcard .fpurpose{font-size:12.5px;color:var(--ink-soft);margin:2px 0 0}
  .fcard .fchain{font-size:11.5px;color:var(--ink-faint);margin-top:9px;border-top:1px dashed var(--line-2);padding-top:7px}

  /* flow detail */
  .kv{display:grid;grid-template-columns:150px 1fr;gap:2px 14px;margin:14px 0}
  .kv .k{color:var(--ink-faint);font-size:12.5px;padding:5px 0}
  .kv .v{padding:5px 0}
  .steps{border:1px solid var(--line);border-radius:9px;overflow:hidden;margin-top:8px}
  .srow{display:flex;gap:10px;padding:11px 14px;border-top:1px solid var(--line-2);cursor:pointer;align-items:flex-start}
  .srow:first-child{border-top:0}
  .srow:hover{background:#faf9f7}
  .srow.child{padding-left:40px;background:#fcfbf9}
  .srow.decision{background:#fffdf7}
  .snum{width:26px;height:22px;flex:none;border-radius:5px;background:#f1efec;color:var(--ink-soft);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center}
  .decision .snum{background:var(--order-bg);color:var(--order)}
  .sbody{flex:1;min-width:0}
  .sbody .st{font-weight:600}
  .sbody .sm{font-size:11.5px;color:var(--ink-faint);margin-top:2px;display:flex;gap:8px;flex-wrap:wrap}
  .toggle{font-size:11px;color:var(--accent);margin-left:6px}
  .sdetail{padding:4px 14px 16px 50px;background:#fcfbf9;border-top:1px solid var(--line-2)}
  .sdetail h4{margin:14px 0 6px;font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-faint)}
  .sdetail ol{margin:0;padding-left:20px}.sdetail ol li{margin:3px 0}
  .audit{border:1px solid var(--line);border-radius:7px;padding:2px 12px;background:#fff}
  .audit div{padding:7px 0;border-top:1px solid var(--line-2);font-size:13px}
  .audit div:first-child{border-top:0}
  .audit b{color:var(--ink-soft);font-weight:600}
  .locked{background:var(--lock-bg);border:1px solid #f3c9c5;border-radius:9px;padding:20px;text-align:center;color:var(--lock);margin-top:8px}

  /* onboarding */
  .day{border:1px solid var(--line);border-radius:9px;margin-bottom:12px;overflow:hidden}
  .day-h{background:#faf9f7;padding:10px 14px;font-weight:700;display:flex;justify-content:space-between}
  .day-b{padding:6px 14px}
  .obrow{display:flex;gap:10px;padding:9px 0;border-top:1px solid var(--line-2);align-items:center;cursor:pointer}
  .obrow:first-child{border-top:0}
  .obrow:hover{color:var(--accent)}

  /* routines / table */
  table{border-collapse:collapse;width:100%;font-size:13px}
  th,td{text-align:left;padding:9px 12px;border-bottom:1px solid var(--line-2);vertical-align:top}
  th{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-faint);font-weight:600}
  tr.fresh td{background:var(--accent-soft)}
  .chk{width:16px;height:16px;border:1.5px solid #c9c5bd;border-radius:4px;display:inline-block;cursor:pointer;flex:none;position:relative;top:2px}
  .chk.done{background:var(--ok);border-color:var(--ok)}
  .chk.done::after{content:"✓";color:#fff;font-size:11px;position:absolute;left:2px;top:-2px}
  td.done{color:var(--ink-faint);text-decoration:line-through}

  /* AI panels (scripted) */
  .chat{border:1px solid var(--line);border-radius:11px;background:#fff;overflow:hidden}
  .chat-h{padding:10px 14px;border-bottom:1px solid var(--line);font-size:12px;color:var(--ink-faint);display:flex;align-items:center;gap:8px}
  .dot{width:8px;height:8px;border-radius:50%;background:#22c55e}
  .chat-b{padding:16px;display:flex;flex-direction:column;gap:12px;max-height:none}
  .msg{display:flex;gap:10px;align-items:flex-start}
  .av{width:26px;height:26px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
  .av.u{background:#e9e6df;color:var(--ink-soft)} .av.ai{background:linear-gradient(135deg,#2f6df6,#7c3aed);color:#fff}
  .bub{background:#f7f6f4;border-radius:10px;padding:9px 13px;max-width:80%}
  .msg.me{flex-direction:row-reverse}
  .msg.me .bub{background:var(--accent-soft)}
  .who{font-size:11px;color:var(--ink-faint);margin-bottom:2px}
  .chat-f{border-top:1px solid var(--line);padding:10px;display:flex;gap:8px}
  .chat-f input{flex:1;border:1px solid var(--line);border-radius:8px;padding:9px 12px;font-size:13px;outline:none}
  .chat-f input:focus{border-color:var(--accent)}
  .typing span{display:inline-block;width:6px;height:6px;background:var(--ink-faint);border-radius:50%;margin:0 1px;animation:bl 1s infinite}
  .typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
  @keyframes bl{0%,60%,100%{opacity:.3}30%{opacity:1}}
  .template{border:1px solid var(--line);border-radius:11px;background:#fff;padding:0;margin-top:16px;overflow:hidden}
  .template-h{padding:12px 16px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;background:#faf9f7}
  .template-h b{font-size:13px}
  .tfield{display:grid;grid-template-columns:150px 1fr;border-top:1px solid var(--line-2);font-size:13px}
  .tfield:first-child{border-top:0}
  .tfield .tk{padding:9px 16px;color:var(--ink-faint);background:#fcfbf9;border-right:1px solid var(--line-2)}
  .tfield .tv{padding:9px 16px}
  .prompts{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0 4px}
  .chip{border:1px solid var(--line);background:#fff;border-radius:20px;padding:6px 13px;font-size:12.5px;color:var(--ink-soft)}
  .chip:hover{border-color:var(--accent);color:var(--accent)}
  .cite{border:1px solid var(--line);border-radius:7px;padding:8px 11px;margin-top:8px;background:#fcfbf9;font-size:12.5px;cursor:pointer}
  .cite:hover{border-color:var(--accent)}

  /* quiz */
  .q{border:1px solid var(--line);border-radius:10px;padding:16px;margin-bottom:12px}
  .q .qq{font-weight:650;margin-bottom:10px}
  .opt{display:block;width:100%;text-align:left;border:1px solid var(--line);background:#fff;border-radius:8px;padding:10px 13px;margin:7px 0}
  .opt:hover{border-color:var(--accent)}
  .opt.sel{border-color:var(--accent);background:var(--accent-soft)}
  .opt.correct{border-color:var(--ok);background:var(--ok-bg)}
  .opt.wrong{border-color:var(--lock);background:var(--lock-bg)}
  .scorebig{font-size:40px;font-weight:800;letter-spacing:-.02em}

  /* toast */
  .toast-wrap{position:fixed;right:22px;bottom:22px;display:flex;flex-direction:column;gap:10px;z-index:50}
  .toast{background:#20201d;color:#fff;border-radius:10px;padding:13px 16px;box-shadow:0 10px 30px rgba(0,0,0,.25);max-width:340px;animation:pop .25s}
  .toast b{display:block;margin-bottom:3px}
  .toast small{color:#c7c4bd;display:block;line-height:1.45}
  @keyframes pop{from{opacity:0;transform:translateY(10px)}to{opacity:1}}
  .loopbar{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
  .loopbar span{font-size:11px;padding:3px 9px;border-radius:20px;background:#f1efec;color:var(--ink-faint)}
  .loopbar span.lit{background:var(--ok-bg);color:var(--ok);font-weight:600}
  @media(max-width:820px){.app{grid-template-columns:1fr}.side{display:none}.board{grid-template-columns:1fr}.wrap{padding:22px}}
</style>

<div class="app">
  <aside class="side">
    <div class="brand">
      <div class="logo">BW</div>
      <div><b>Wolter OS</b><span>Operational System · POC</span></div>
    </div>
    <div class="persona">
      <div class="persona-lbl">Lihat sebagai</div>
      <div class="seg" id="seg">
        <button data-p="management" class="on">Management</button>
        <button data-p="staff">Staff</button>
      </div>
      <div class="rolepick" id="rolepick" style="display:none">
        <select id="roleSel"></select>
      </div>
    </div>
    <nav class="nav" id="nav"></nav>
    <div class="sidefoot">
      Mock POC · data = 9 flow / 91 SOP nyata dari <code>docs/</code>.<br>Panel AI = skrip demo.
    </div>
  </aside>
  <main class="main" id="main"></main>
</div>
<div class="toast-wrap" id="toasts"></div>

<script>

/* ============================================================= CSV parser */
function parseCSV(text){
  const rows=[]; let row=[], field='', q=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(q){
      if(c==='"'){ if(text[i+1]==='"'){field+='"';i++;} else q=false; }
      else field+=c;
    } else {
      if(c==='"') q=true;
      else if(c===','){ row.push(field); field=''; }
      else if(c==='\n'){ row.push(field); rows.push(row); row=[]; field=''; }
      else if(c==='\r'){}
      else field+=c;
    }
  }
  if(field.length||row.length){ row.push(field); rows.push(row); }
  const head=rows.shift();
  return rows.map(r=>{ const o={}; head.forEach((h,i)=>o[h]=(r[i]||'').trim()); return o; });
}
function toList(s){ return (s||'').split(',').map(x=>x.trim()).filter(Boolean); }

/* ============================================================= build model */
const CAT_META={
  'FLOW ORDER':{cls:'p-order',short:'ORDER'},
  'FLOW PRODUKSI':{cls:'p-prod',short:'PRODUKSI'},
  'FLOW SUPPORT':{cls:'p-support',short:'SUPPORT'}
};
let SOPS=parseCSV(RAW_SOP).map(r=>({
  title:r['Judul SOP'], id:r['ID'], role:r['Peran'], flow:r['Proses'], type:r['Tipe'],
  path:r['Jalur'], parent:r['Induk (ID)'], order:+r['Urutan']||0, level:r['Level'],
  when:r['Kapan Dipakai'], keywords:r['Kata Kunci'], branchTo:r['Cabang Ke'],
  steps:(r['Langkah']||'').split('\n').map(s=>s.replace(/^\d+\.\s*/,'').trim()).filter(Boolean),
  audit:parseAudit(r['Mekanisme Audit'])
}));
function parseAudit(s){
  const o={notDone:'',wrong:'',by:''}; (s||'').split('\n').forEach(l=>{
    if(l.startsWith('JIKA TIDAK DIKERJAKAN:')) o.notDone=l.split(':').slice(1).join(':').trim();
    else if(l.startsWith('JIKA DIKERJAKAN')) o.wrong=l.split(':').slice(1).join(':').trim();
    else if(l.startsWith('DICEK OLEH:')) o.by=l.split(':').slice(1).join(':').trim();
  }); return o;
}
let FLOWS=parseCSV(RAW_PROSES).map(r=>({
  name:r['Nama Flow'], category:r['Kategori'], type:r['Tipe Flow'], purpose:r['Tujuan'],
  scope:r['Ruang Lingkup'], roles:toList(r['Peran Terlibat']), day:r['Hari'],
  ordExt:+r['Urutan Extensive'], ordBiz:+r['Urutan Bisnis'], keywords:r['Kata Kunci'],
  next:r['Lanjut Ke'], status:'Aktif', owner:'—', version:'v1.0', fresh:false
}));
function sopsOf(flow){ return SOPS.filter(s=>s.flow===flow).sort((a,b)=>{
  if(a.path===b.path) return a.order-b.order; return a.path==='Utama'?-1:1; }); }
function flowByName(n){ return FLOWS.find(f=>f.name===n); }
function allRoles(){ const set=new Set(); SOPS.forEach(s=>set.add(s.role)); return [...set].sort(); }

/* ============================================================= helpers */
const el=(h)=>{const t=document.createElement('template');t.innerHTML=h.trim();return t.content.firstElementChild;};
function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function pill(cls,txt){return `<span class="pill ${cls}">${txt}</span>`;}
function catPill(c){return pill(CAT_META[c].cls,CAT_META[c].short);}
function typePill(t){return t==='Bercabang'?pill('p-branch','⌥ Bercabang'):pill('p-linear','→ Linear');}

function toast(title,body){
  const t=el(`<div class="toast"><b>${title}</b><small>${body}</small></div>`);
  document.getElementById('toasts').appendChild(t);
  setTimeout(()=>{t.style.transition='.4s';t.style.opacity='0';setTimeout(()=>t.remove(),400)},4200);
}

/* ---- 5/4 POST-TEST ---- */
function buildQuiz(flowName){
  const sops=sopsOf(flowName).filter(s=>s.steps.length>=2&&s.type!=='Keputusan');
  const pick=sops.slice(0,3);
  return pick.map((s,qi)=>{
    // Q: what is step 1 of this SOP? options = step1 of others
    const correct=s.steps[0];
    const distract=sops.filter(x=>x.id!==s.id).map(x=>x.steps[0]).filter(Boolean);
    const opts=shuffle([correct,...distract.slice(0,2)]);
    return {q:`Pada SOP "<b>${esc(s.title)}</b>" (${esc(s.role)}), apa langkah pertamanya?`,opts,correct};
  });
}
function shuffle(a){ // deterministic-ish, no Math.random need
  const r=a.slice(); for(let i=r.length-1;i>0;i--){const j=(i*7+3)%(i+1);[r[i],r[j]]=[r[j],r[i]];} return r;
}
let QUIZ=[];
function viewTest(){
  QUIZ=buildQuiz(state.quizFlow);
  const opts=FLOWS.map(f=>`<option ${f.name===state.quizFlow?'selected':''}>${esc(f.name)}</option>`).join('');

  if(!state.quizDone){

      +`<button class="btn pri" id="quizSubmit" ${Object.keys(state.quizAns).length<QUIZ.length?'disabled':''}>Kumpulkan & Simpan Skor</button>`;
  } else {

    const score=Math.round(correct/QUIZ.length*100);
    body=`<div class="card" style="padding:24px;text-align:center;margin-bottom:16px">
      <div class="scorebig" style="color:${score>=67?'var(--ok)':'var(--lock)'}">${score}</div>
      <div class="muted">${correct}/${QUIZ.length} benar · skor tersimpan ke catatan</div></div>
      ${QUIZ.map((q,qi)=>`<div class="q"><div class="qq">${qi+1}. ${q.q}</div>
        ${q.opts.map(o=>{let c=o===q.correct?'correct':(state.quizAns[qi]===o?'wrong':'');return `<div class="opt ${c}">${esc(o)}${o===q.correct?' ✓':''}</div>`}).join('')}</div>`).join('')}
      <button class="btn" id="quizReset">Ulangi</button>`;
  }
  const scoreTable=`<h2>📊 Skor Tersimpan</h2>
    <div class="card"><table><thead><tr><th>Peserta</th><th>Flow</th><th>Skor</th><th>Waktu</th></tr></thead>

   a:'Di flow <b>Proses Membatik</b> ada titik keputusan <b>PRD6-05 · KEPUTUSAN: Lolos QC Tengah?</b>. Bila <b>CACAT → Jalur B (Rework)</b>: pengrajin <b>Identifikasi Cacat (PRD6-09)</b> lalu <b>Lakukan Rework (PRD6-10)</b>, kemudian <b>kembali ke keputusan QC Tengah</b> untuk dicek ulang. Bila lolos → Jalur A lanjut ke pewarnaan kedua & finishing.',
   cites:['PRD6-05','PRD6-09','PRD6-10']},
  {q:'Proses mana yang menyambung ke Persiapan Kain & Desain?',
   a:'Flow <b>Pemesanan Bespoke</b> menyambung ke <b>Persiapan Kain & Desain</b>. Titik sambungnya SOP <b>ORD3-09 · Head Produksi: Kunci Order & Lanjut Produksi</b> (Jalur A) — setelah DP lunas & spesifikasi final, order di-set "Siap Produksi" lalu LANJUT KE Persiapan Kain & Desain.',
   cites:['ORD3-09']}
];
function viewAI(){
  return `
   <div class="crumb">AI Retrieval</div>
   <h1>🤖 AI Retrieval</h1>
   <p class="lead">Poin #6 — tanya apa saja, AI menjawab dengan menarik data dari flow/SOP yang tersimpan (Kata Kunci + relasi). Jawaban selalu <b>menyebut ID SOP sumbernya</b> supaya bisa ditelusuri.</p>
   <div class="prompts">${CANNED.map((c,i)=>`<button class="chip" data-canned="${i}">${esc(c.q)}</button>`).join('')}</div>
   <div class="chat" style="margin-top:8px">
     <div class="chat-h"><span class="dot"></span> Asisten AI · membaca 9 flow / ${SOPS.length} SOP</div>
     <div class="chat-b" id="aiChat">
       ${msgHTML({who:'AI Asisten',ai:true,txt:'Halo — tanyakan apa saja soal SOP & alur kerja. Coba salah satu contoh di atas, atau ketik kata kunci (mis. "packing", "refund", "canting").'})}
     </div>
     <div class="chat-f"><input id="aiInput" placeholder="Tanya sesuatu… lalu Enter"><button class="btn pri" id="aiSend">Kirim</button></div>
   </div>
   ${loopBar()}
  `;
}
function aiAnswer(query){
  const chat=document.getElementById('aiChat');
  chat.appendChild(el(msgHTML({who:state.persona==='staff'?state.role:'Management',me:true,txt:esc(query)})));
  const typing=el(`<div class="msg"><div class="av ai">AI</div><div><div class="who">AI Asisten</div><div class="bub typing"><span></span><span></span><span></span></div></div></div>`);
  chat.appendChild(typing); chat.scrollTop=chat.scrollHeight;
  const canned=CANNED.find(c=>c.q.toLowerCase()===query.toLowerCase());
  let ansHTML,cites;
  if(canned){ ansHTML=canned.a; cites=canned.cites; }
  else {
    const q=query.toLowerCase();
    const hits=SOPS.filter(s=>(s.keywords+' '+s.title+' '+s.flow).toLowerCase().includes(q)).slice(0,4);
    if(hits.length){ ansHTML=`Dari pencarian kata kunci "<b>${esc(query)}</b>", aku menemukan ${hits.length} SOP relevan di sistem. Ringkasannya: ${hits.map(h=>`<b>${esc(h.title)}</b> (peran ${esc(h.role)}, flow ${esc(h.flow)})`).join('; ')}.`; cites=hits.map(h=>h.id); }
    else { ansHTML=`Aku belum menemukan SOP yang cocok dengan "<b>${esc(query)}</b>". Coba kata kunci lain seperti nama proses, peran, atau istilah teknis (canting, ekspedisi, DP, vendor).`; cites=[]; }
  }
  setTimeout(()=>{
    typing.remove();
    const citeHTML=(cites||[]).map(id=>{const s=SOPS.find(x=>x.id===id);return s?`<div class="cite" data-cite="${id}">📄 <b>${esc(id)}</b> · ${esc(s.title)} <span class="muted">— buka di ${esc(s.flow)}</span></div>`:'';}).join('');
    chat.appendChild(el(`<div class="msg"><div class="av ai">AI</div><div style="max-width:82%"><div class="who">AI Asisten</div><div class="bub">${ansHTML}${citeHTML?`<div style="margin-top:8px">${citeHTML}</div>`:''}</div></div></div>`));
    chat.scrollTop=chat.scrollHeight;
    litLoop('retrieve');
    wire();
  },650);
}

/* ---- SCHEMA ---- */

  const row=(f,t,d)=>`<tr><td><code>${f}</code></td><td>${t}</td><td class="muted">${d}</td></tr>`;
  return `
   <div class="crumb">Referensi</div>
   <h1>🧩 Skema Standar (disederhanakan)</h1>
   <p class="lead">Versi ringkas dari "Project Output" di ROAD MAP.pdf — cukup untuk membuktikan seluruh data saling terhubung. Field kaya (sponsor, changelog, escalation, FAQ, dll.) sengaja ditunda.</p>
   <h2>Entitas: Flow (Proses)</h2>
   <div class="card"><table><thead><tr><th>Field</th><th>Tipe</th><th>Peran dalam sistem</th></tr></thead><tbody>
   ${row('name','text','judul proses')}
   ${row('category','select','FLOW ORDER / PRODUKSI / SUPPORT — untuk Division Flow')}
   ${row('type','select','Linear / Bercabang')}
   ${row('purpose / scope','text','ditampilkan di header flow')}
   ${row('roles[]','multi','filter Onboarding & sumber Daily Routines')}
   ${row('day','select','pengelompokan Onboarding')}
   ${row('next (Lanjut Ke)','relation','menyambung antar-flow (interkoneksi)')}
   ${row('keywords','text','bahan AI Retrieval')}
   </tbody></table></div>
   <h2>Entitas: SOP (di dalam Flow)</h2>
   <div class="card"><table><thead><tr><th>Field</th><th>Tipe</th><th>Peran dalam sistem</th></tr></thead><tbody>
   ${row('id','text','identitas & sitiran AI')}
   ${row('role','select','pemilik tugas → Daily Routines')}
   ${row('type','select','Aksi / Keputusan (titik cabang)')}
   ${row('path / parent','relation','pohon percabangan (sub-items)')}
   ${row('level','select','Umum / Rahasia — kontrol akses')}
   ${row('steps[]','list','isi post-test & panduan kerja')}
   ${row('audit{}','object','jika-tidak-dikerjakan / tidak-sesuai / dicek-oleh → rutinitas auditor')}
   </tbody></table></div>
   <div class="note">Satu perubahan data di sini otomatis menjalar ke Division Flow, Onboarding, Daily Routines, Post-Test, dan AI Retrieval. Itulah inti buktinya: <b>kelola data dengan benar & saling terhubung → sistem operasional yang bisa berputar sendiri.</b></div>
  `;
}

/* ---- loop bar (shows the interconnection lighting up) ---- */
function loopBar(){
  const L=state.loop;
  const item=(k,t)=>`<span class="${L[k]?'lit':''}">${L[k]?'✓ ':''}${t}</span>`;
  return `<div style="margin-top:34px;padding-top:16px;border-top:1px solid var(--line-2)">
    <div class="muted" style="font-size:12px;margin-bottom:4px">Loop sistem (menyala saat kamu memakai tiap bagian):</div>
    <div class="loopbar">
      ${item('store','1 · Flow disimpan (AI Studio)')}
      ${item('division','2 · Division Flow')}
      ${item('onboard','3 · Onboarding')}
      ${item('test','4 · Post-Test')}
      ${item('routine','5 · Daily Routines')}
      ${item('retrieve','6 · AI Retrieval')}
    </div></div>`;
}
function litLoop(k){ if(!state.loop[k]){ state.loop[k]=true; } }

/* ============================================================= WIRING */
function wire(){
  // mark loop by current view
  const map={studio:'store_none',division:'division',onboard:'onboard',routine:'routine',test:'test',ai:'retrieve'};
  if(map[state.view]&&map[state.view]!=='store_none') litLoop(map[state.view]);

  document.querySelectorAll('[data-go]').forEach(a=>a.onclick=()=>{state.view=a.dataset.go;state.flow=null;render();});
  document.querySelectorAll('[data-flow]').forEach(c=>c.onclick=()=>{state.flow=flowByName(c.dataset.flow);state.view='division'==state.view?'division':state.view; if(state.view==='onboard'){state.view='division';} state.openSop=null; render();});
  // in onboard, clicking a flow should open division detail
  document.querySelectorAll('.obrow[data-flow]').forEach(c=>c.onclick=()=>{state.flow=flowByName(c.dataset.flow);state.view='division';state.openSop=null;render();});

  document.querySelectorAll('.srow[data-sop]').forEach(r=>r.onclick=()=>{state.openSop=state.openSop===r.dataset.sop?null:r.dataset.sop;render();});

  const go=document.getElementById('studioGo'); if(go) go.onclick=()=>{state.studioStage=1;render();};
  const st=document.getElementById('studioStruct'); if(st) st.onclick=()=>{state.studioStage=2;render();};
  const store=document.getElementById('studioStore'); if(store) store.onclick=storeFlow;

  const qf=document.getElementById('quizFlow'); if(qf) qf.onchange=()=>{state.quizFlow=qf.value;state.quizAns={};state.quizDone=false;render();};
  document.querySelectorAll('.opt[data-q]').forEach(o=>o.onclick=()=>{state.quizAns[+o.dataset.q]=o.dataset.o;render();});
  const qs=document.getElementById('quizSubmit'); if(qs) qs.onclick=()=>{state.quizDone=true;
    const correct=QUIZ.filter((q,qi)=>state.quizAns[qi]===q.correct).length;const score=Math.round(correct/QUIZ.length*100);
    state.scores.unshift({who:(state.persona==='staff'?state.role:'Demo User'),flow:state.quizFlow,score,date:'baru saja'});
    litLoop('test'); toast('Skor tersimpan','Post-test '+state.quizFlow+' → '+score+'. Muncul di tabel skor & rekap management.'); render();};
  const qr=document.getElementById('quizReset'); if(qr) qr.onclick=()=>{state.quizAns={};state.quizDone=false;render();};

  document.querySelectorAll('[data-canned]').forEach(c=>c.onclick=()=>aiAnswer(CANNED[+c.dataset.canned].q));
  const ai=document.getElementById('aiSend'),inp=document.getElementById('aiInput');
  if(ai) ai.onclick=()=>{if(inp.value.trim()){const v=inp.value;inp.value='';aiAnswer(v);}};
  if(inp) inp.onkeydown=e=>{if(e.key==='Enter'&&inp.value.trim()){const v=inp.value;inp.value='';aiAnswer(v);}};
  document.querySelectorAll('[data-cite]').forEach(c=>c.onclick=()=>{const s=SOPS.find(x=>x.id===c.dataset.cite);if(s){state.flow=flowByName(s.flow);state.view='division';state.openSop=s.id;render();}});

  document.querySelectorAll('[data-done]').forEach(c=>c.onclick=()=>{const k=c.dataset.done;state.done[k]=!state.done[k];render();});
}
function storeFlow(){
  const r=STUDIO_RESULT;
  if(flowByName(r.name)){ state.studioStage=3; render(); return; }
  FLOWS.push({name:r.name,category:r.category,type:r.type,purpose:r.purpose,scope:r.scope,roles:r.roles,
    day:r.day,ordExt:99,ordBiz:99,keywords:r.keywords,next:r.next,status:'Aktif',owner:'AI Draft',version:'v1.0',fresh:true});
  r.sops.forEach(s=>SOPS.push({title:s.title,id:s.id,role:s.role,flow:r.name,type:s.type,path:s.path||'Utama',
    parent:s.parent||'',order:s.order,level:'Umum',when:s.when,keywords:'',branchTo:s.branchTo||'',steps:s.steps,audit:s.audit}));
  state.studioStage=3; litLoop('store');
  toast('✅ Flow tersimpan',`"${r.name}" masuk ke Lemari Proses. Division Flow, Onboarding, Daily Routines & Post-Test otomatis ter-update.`);
  render();
}

/* ============================================================= boot */
document.querySelectorAll('#seg button').forEach(b=>b.onclick=()=>{
  state.persona=b.dataset.p; render();
});
const roleSel=document.getElementById('roleSel');
allRoles().forEach(r=>roleSel.appendChild(el(`<option ${r==='Sales/CS'?'selected':''}>${esc(r)}</option>`)));
roleSel.onchange=()=>{state.role=roleSel.value;render();};
render();
</script>
